  val_labels_path: null
  validation_fraction: 0.1
  test_file_path: null
  provider: LabelsReader
  user_instances_only: true
  data_pipeline_fw: torch_dataset_cache_img_memory
  cache_img_path: null
  use_existing_imgs: false
  delete_cache_imgs_after_training: true
  parallel_caching: true
  cache_workers: 0
  preprocessing:
    ensure_rgb: false
    ensure_grayscale: true
    max_height: 1024
    max_width: 1024
    scale: 1
    crop_size: null
  use_augmentations_train: true
  augmentation_config: 
    intensity:
      contrast_min: 0.65
      contrast_max: 1.35
      contrast_p: 1.0
      brightness_min: 0.55
      brightness_max: 1.45
      brightness_p: 1.0
    geometric:
      rotation_min: -180
      rotation_max: 180
      rotation_p: 1.0
      scale_min: 0.80
      scale_max: 1.20
      scale_p: 1.0
      translate_width: 0.03
      translate_height: 0.03
      translate_p: 1.0

model_config:
  init_weights: default
  pretrained_backbone_weights: null
  pretrained_head_weights: null
  backbone_config:
    unet:
      in_channels: 1
      kernel_size: 3
      filters: 48
      filters_rate: 1.5
      max_stride: 64
      output_stride: 2
    convnext: null
    swint: null
  head_configs:
    single_instance: null
    centroid: null
    centered_instance: null
    bottomup:
      confmaps:
        part_names:
          - Head
          - Base
          - Flag1
          - Flag2
          - Flag3
          - Flag4
          - Flag5
          - Tip
        sigma: 1.5
        output_stride: 2
        loss_weight: 1
      pafs:
        edges:
          - [Head, Base]
          - [Base, Flag1]
          - [Flag1, Flag2]
          - [Flag2, Flag3]
          - [Flag3, Flag4]
          - [Flag4, Flag5]
          - [Flag5, Tip]
        sigma: 10
        output_stride: 4
        loss_weight: 1
    multi_class_bottomup: null
    multi_class_topdown: null

trainer_config:
  train_data_loader:
    batch_size: 8
    shuffle: true
    num_workers: 8
  val_data_loader:
    batch_size: 8
    shuffle: false
    num_workers: 8
  model_ckpt:
    save_top_k: 1
    save_last: true
  trainer_devices: auto
  trainer_accelerator: auto
  enable_progress_bar: true
  min_train_steps_per_epoch: 200
  visualize_preds_during_training: true
  keep_viz: true
  max_epochs: 200
  seed: null
  use_wandb: false
  save_ckpt: true
  ckpt_dir: ./models
  run_name: null
  resume_ckpt_path: null
  optimizer_name: Adam
  optimizer:
    lr: 0.0001
    amsgrad: false
  lr_scheduler:
    step_lr: null
    reduce_lr_on_plateau:
      threshold: 0.000001
      threshold_mode: abs
      cooldown: 3
      patience: 5
      factor: 0.5
      min_lr: 1e-8
    cosine_annealing_warmup: null
    linear_warmup_linear_decay: null
  early_stopping:
    stop_training_on_plateau: true
    min_delta: 0.000001
    patience: 5
  online_hard_keypoint_mining:
    online_mining: true
    hard_to_easy_ratio: 2
    min_hard_keypoints: 2
    max_hard_keypoints: null
    loss_scale: 5
  eval:
    enabled: true
    frequency: 1
    oks_stddev: 0.025
