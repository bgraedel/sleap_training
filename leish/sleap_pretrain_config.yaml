# =============================================================================
# Synthetic Leishmania dataset for SLEAP pretraining
# =============================================================================
#
# Goal: pretrain a SLEAP pose model that generalises to real phase-contrast
# recordings of Leishmania promastigotes at BOTH 20x and 60x. Real cultures
# include WT cells and various mutants (aggressive curls, altered beat
# frequencies, paralysed cells); the synthetic distribution should cover all
# of these.
#
# Variation strategy:
#   - Per-FRAME jitter in random mode (`per_frame_jitter: true` by default):
#     every frame draws PSF, halo, gain, full-well, and read noise from a
#     band around the setup defaults. So a 2200-frame random setup is
#     effectively 2200 different "sessions" in one block.
#   - Per-CLIP jitter via `repeats: N`: the video setups below each expand
#     into N independent short clips, each with its own seed and per-clip
#     drift in optics/noise. This gives many short tracking sequences
#     instead of one long monotonous video.
#   - Per-CELL darkness range (in `sample_random_parasite`): cells in the
#     same frame have visibly different opacity (dense mature cells -> very
#     dark; thinner younger cells -> lighter).
#   - Per-FRAME background regenerated with widened dust/debris/blob ranges.
#
# Mutant phenotypes (aggressive curls, altered frequencies, ~5% paralysed)
# come from the wide sampling distribution in sample_random_parasite — no
# mutant-specific setup needed.
#
# Frame budget: ~12,500 across 12 setup definitions.  After repeat expansion,
# the video setups produce 50 separate clip folders.  Total folders: ~60.
#
# Run with:
#   python dataset_builder.py multi sleap_pretrain_config.yaml
# =============================================================================

output_dir: data/leishmania_pretrain_2
mode: random
seed: 42

# --- Defaults applied to every setup unless overridden ---

n_frames: 1500
image_shape: [1024, 1024]
flag_keypoints: 5                 # 5 interior flagellum nodes (Flag1..Flag5)
                                  # Skeleton total: Head, Base, Flag1..Flag5, Tip = 8 nodes
fast: true
video_format: mp4
embed_frames: true
per_frame_jitter: true            # random mode: jitter PSF/halo/gain/noise per frame

# Video-mode defaults
fps: 60.0
n_parasites: 27
periodic_boundary: true

# Random-mode defaults
parasites_per_frame: [9, 27]
bg_intensity_range: [0.25, 0.95]    # very wide bright/dim session variation

# Per-frame background clutter (dust/rings/ghost cells) intensity multiplier.
# 1.0 is "normal" PhC. Real cultures often have richer backgrounds, so we
# sample in [0.8, 2.0] for positives to expose the model to realistic
# artifact density alongside real cells. Negative setups override this with
# higher values to create hard-negative training examples.
clutter_level: [0.8, 2.0]

save_frames: all

# Optics: defaults match a 60x phase-contrast acquisition.
# 20x setups override pixel_size_um and PSF parameters.
optics:
  pixel_size_um: 0.108           # 60x objective (kept scalar - mag-specific)
  psf_sigma_um: 0.13             # scalar -> multiplicative jitter
  # The rest are EXPLICIT RANGES sampled uniformly per frame. Sample from
  # WIDE bands so the model sees clean/sharp through to heavy-halo/soft within
  # one setup. Per-setup overrides below can narrow these to mag-appropriate
  # subranges.
  halo_strength: [0.25, 1.40]
  halo_lowpass_sigma_um: [2.5, 6.5]
  intensity_gain: [0.45, 1.00]
  shadeoff_threshold: [0.60, 0.92]
  shadeoff_strength: [0.05, 0.30]
  body_edge_smooth_sigma_um: [0.15, 0.55]

# Camera noise: realistic sCMOS in normal-light Ph1 mode.
# Ranges sampled per frame for session-to-session variation.
noise:
  full_well_photons: [600, 4500]   # very-low-light → bright illumination
  read_noise_e: [1.5, 6.0]
  bg_intensity: 0.7                # scalar - actually overridden by bg_intensity_range
  dark_offset: -0.05


# =============================================================================
# Setups
# =============================================================================

setups:

  # ---------------------------------------------------------------------------
  # PRIMARY 20x and 60x random pools (per-frame jitter -> diverse "sessions")
  # ---------------------------------------------------------------------------
  - name: 20x_main
    n_frames: 2200
    optics:
      pixel_size_um: 0.325       # 20x
      psf_sigma_um: 0.32
      halo_lowpass_sigma_um: 4.0
    parasites_per_frame: [14, 44]

  - name: 60x_main
    n_frames: 2200
    parasites_per_frame: [5, 21]

  # ---------------------------------------------------------------------------
  # DENSITY VARIATIONS
  # ---------------------------------------------------------------------------
  - name: 20x_dense
    n_frames: 1100
    optics:
      pixel_size_um: 0.325
      psf_sigma_um: 0.32
      halo_lowpass_sigma_um: 4.0
    parasites_per_frame: [44, 98]

  - name: 60x_dense
    n_frames: 1100
    parasites_per_frame: [21, 44]

  # ---------------------------------------------------------------------------
  # VERY DENSE - extreme cell counts for crossing-flagella / overlap learning.
  # Stationary-phase cultures and hemocytometer chambers can look like this.
  # The model needs to handle these hard cases (occlusion, halo collisions,
  # many crossings) so it doesn't fail on real dense fields of view.
  # ---------------------------------------------------------------------------
  - name: 20x_very_dense
    n_frames: 500
    optics:
      pixel_size_um: 0.325
      psf_sigma_um: 0.32
      halo_lowpass_sigma_um: 4.0
    parasites_per_frame: [178, 356]    # many crossings at 20x

  - name: 60x_very_dense
    n_frames: 500
    parasites_per_frame: [71, 142]      # heavy overlap at 60x

  # ---------------------------------------------------------------------------
  # LIGHTING VARIATIONS - shifts base distribution to dimmer half of plausible
  # range. Per-frame jitter then explores around the dim baseline.
  # ---------------------------------------------------------------------------
  - name: 20x_dimmer
    n_frames: 800
    optics:
      pixel_size_um: 0.325
      psf_sigma_um: 0.32
      halo_lowpass_sigma_um: 4.0
    noise:
      full_well_photons: 1500
      read_noise_e: 5
      bg_intensity: 0.55
    bg_intensity_range: [0.45, 0.65]
    parasites_per_frame: [14, 44]

  - name: 60x_dimmer
    n_frames: 800
    noise:
      full_well_photons: 1500
      read_noise_e: 5
      bg_intensity: 0.55
    bg_intensity_range: [0.45, 0.65]
    parasites_per_frame: [5, 21]

  # ---------------------------------------------------------------------------
  # EXTREME LOW SNR - dramatic noise + dim conditions, marginal acquisition.
  # Few-hundred-photon full well, high read noise, dim background. The model
  # needs to handle these so it doesn't fail on actually-noisy real recordings
  # (short exposures, low illumination, old cameras, weak lamps).
  # Frames that come out of these setups should look visibly grainy.
  # ---------------------------------------------------------------------------
  - name: 20x_low_snr
    n_frames: 600
    optics:
      pixel_size_um: 0.325
      psf_sigma_um: 0.32
      halo_lowpass_sigma_um: 4.0
    noise:
      full_well_photons: 500          # very low photon budget
      read_noise_e: 7                 # high read noise (~older camera)
      bg_intensity: 0.40              # dim baseline
      dark_offset: -0.05
    bg_intensity_range: [0.25, 0.55]  # very dim sessions
    parasites_per_frame: [14, 44]

  - name: 60x_low_snr
    n_frames: 600
    noise:
      full_well_photons: 500
      read_noise_e: 7
      bg_intensity: 0.40
      dark_offset: -0.05
    bg_intensity_range: [0.25, 0.55]
    parasites_per_frame: [5, 21]

  # ---------------------------------------------------------------------------
  # FOCUS VARIATIONS - inflated PSF baseline; jitter widens further.
  # ---------------------------------------------------------------------------
  - name: 20x_defocused
    n_frames: 800
    optics:
      pixel_size_um: 0.325
      psf_sigma_um: 0.55
      halo_strength: 1.0
      halo_lowpass_sigma_um: 6.0
    parasites_per_frame: [14, 44]

  - name: 60x_defocused
    n_frames: 800
    optics:
      psf_sigma_um: 0.30
      halo_strength: 1.0
      halo_lowpass_sigma_um: 5.5
    parasites_per_frame: [5, 21]

  # ---------------------------------------------------------------------------
  # OFF-MAGNIFICATION (smaller portion of total budget)
  # ---------------------------------------------------------------------------
  - name: 40x_intermediate
    n_frames: 800
    optics:
      pixel_size_um: 0.163
      psf_sigma_um: 0.20
      halo_lowpass_sigma_um: 3.5
    parasites_per_frame: [11, 32]

  - name: 100x_detail
    n_frames: 500
    optics:
      pixel_size_um: 0.065
      psf_sigma_um: 0.10
      halo_lowpass_sigma_um: 3.0
    parasites_per_frame: [2, 9]

  # ---------------------------------------------------------------------------
  # SHORT VIDEO CLIPS - for tracking-model pretraining.
  # `repeats: 25` expands each into 25 independent 1.5s clips, each with own
  # parasites/background and own per-clip drift in optics/noise (within
  # realistic envelopes). All saved frames at every_n=5 -> ~18 frames/clip.
  # ---------------------------------------------------------------------------
  - name: 20x_short_clips
    mode: video
    n_frames: 90                 # 1.5s at 60fps per clip
    fps: 60.0
    n_parasites: 25
    optics:
      pixel_size_um: 0.325
      psf_sigma_um: 0.32
      halo_lowpass_sigma_um: 4.0
    repeats: 25                  # 25 short clips with per-clip jitter
    save_frames: {every_n: 5}    # ~18 saved/clip × 25 = ~450 frames

  - name: 60x_short_clips
    mode: video
    n_frames: 90
    fps: 60.0
    n_parasites: 12
    repeats: 25
    save_frames: {every_n: 5}    # ~450 frames

  # ---------------------------------------------------------------------------
  # NEGATIVE FRAMES - empty-background frames for sleap-nn's
  # `use_negative_frames` feature. Teaches the model not to hallucinate cells
  # on background clutter (halos, dust, debris rings, ghost out-of-focus
  # blobs). All frames are marked is_negative=True in the .slp.
  #
  # Sized to ~10% of positive frame count, spread across magnifications and
  # SNR regimes so the model sees diverse "empty" environments. Per-frame
  # jitter on optics/noise/bg_intensity gives wide visual variety in one set.
  #
  # In your sleap-nn training config, enable with:
  #   data_config:
  #     use_negative_frames: true
  #     negative_loss_weight: 1.0
  # ---------------------------------------------------------------------------

  - name: 60x_negatives
    mode: negative
    n_frames: 600
    clutter_level: [1.0, 2.5]              # mild-to-moderate clutter

  - name: 20x_negatives
    mode: negative
    n_frames: 500
    clutter_level: [1.0, 2.5]
    optics:
      pixel_size_um: 0.325
      psf_sigma_um: 0.32
      halo_lowpass_sigma_um: 4.0

  - name: 60x_negatives_dirty
    mode: negative
    n_frames: 300
    clutter_level: [2.0, 4.0]              # heavy clutter — the trap setup
    optics:
      psf_sigma_um: 0.30
      halo_strength: [0.8, 1.6]
      halo_lowpass_sigma_um: [4.0, 7.0]
    noise:
      full_well_photons: [400, 1500]
      read_noise_e: [4.0, 8.0]
      bg_intensity: 0.55

  - name: 60x_negatives_extreme_artifacts
    mode: negative
    n_frames: 200
    clutter_level: [3.0, 5.0]              # cell-mimicking-artifact-rich
    optics:
      halo_strength: [1.0, 1.8]
      halo_lowpass_sigma_um: [4.5, 7.0]

  - name: 100x_negatives
    mode: negative
    n_frames: 200
    clutter_level: [1.0, 3.0]
    optics:
      pixel_size_um: 0.065
      psf_sigma_um: 0.10
      halo_lowpass_sigma_um: 3.0
